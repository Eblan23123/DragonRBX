                        card.innerHTML = `<span class="card-badge ${badgeClass}">${badgeText}</span>
                                          <div class="card-title">${game.title}</div>
                                          <div class="card-desc">${game.desc}</div>`;
                        container.appendChild(card);
                    });
                }

                fillSection('cards-paytowin', data.games.paytowin, 'badge-paytowin');
                fillSection('cards-grindy', data.games.grindy, 'badge-grindy');
                fillSection('cards-good', data.games.good, 'badge-good');
            }

            function applyLanguage(lang) {
                localStorage.setItem(STORAGE_KEY, lang);
                setActiveHeaderButton(lang);
                renderCards(lang);
                if (!modal.classList.contains('hidden')) {
                    modal.classList.add('hidden');
                }
            }

            const savedLang = localStorage.getItem(STORAGE_KEY);
            if (savedLang && (savedLang === 'ru' || savedLang === 'en')) {
                applyLanguage(savedLang);
                modal.classList.add('hidden');
            } else {
                modal.classList.remove('hidden');
                renderCards('ru');
                setActiveHeaderButton('ru');
            }

            document.querySelectorAll('.lang-btn').forEach(btn => {
                btn.addEventListener('click', function(e) {
                    const lang = this.getAttribute('data-lang');
                    if (lang) applyLanguage(lang);
                });
            });
            headerButtons.forEach(btn => {
                btn.addEventListener('click', function() {
                    const lang = this.getAttribute('data-lang');
                    if (lang) applyLanguage(lang);
                });
            });

            // ======================
            // СИСТЕМА КОММЕНТАРИЕВ (обновлённая)
            // ======================
            const commentsContainer = document.getElementById('comments-container');
            const commentForm = document.getElementById('comment-form');
            const nameInput = document.getElementById('commentName');
            const textInput = document.getElementById('commentText');
            const submitBtn = document.getElementById('submitComment');

            function escapeHtml(text) {
                return text.replace(/&/g,"&amp;").replace(/</g,"&lt;").replace(/>/g,"&gt;").replace(/"/g,"&quot;").replace(/'/g,"&#039;");
            }

            function renderComments(comments) {
                if (!comments.length) {
                    commentsContainer.innerHTML = '<div class="loading-comments">Пока нет комментариев.</div>';
                    return;
                }
                commentsContainer.innerHTML = comments.map(c => {
                    const name = escapeHtml(c.name || 'Аноним');
                    const text = escapeHtml(c.comment || c.text || '');
                    const date = c.timestamp || c.date || '';
                    const formattedDate = date ? new Date(date).toLocaleString() : '';
                    return `<div class="comment-item">
                                <div class="comment-meta">
                                    <span class="comment-author">${name}</span>
                                    <span>${formattedDate}</span>
                                </div>
                                <div class="comment-text">${text}</div>
                            </div>`;
                }).join('');
            }

            async function loadComments() {
                commentsContainer.innerHTML = '<div class="loading-comments">Загрузка комментариев...</div>';
                try {
                    // Добавляем случайный параметр, чтобы обойти кеширование браузером и сервером
                    const cacheBuster = '&_=' + Date.now();
                    const resp = await fetch(SCRIPT_URL + '?action=get' + cacheBuster);
                    if (!resp.ok) throw new Error('Статус ' + resp.status);
                    const data = await resp.json();
                    if (data && data.comments) {
                        renderComments(data.comments);
                    } else {
                        renderComments([]);
                    }
                } catch (err) {
                    console.error('Ошибка загрузки комментариев:', err);
                    commentsContainer.innerHTML = '<div class="loading-comments">⚠️ Не удалось загрузить комментарии с сервера.</div>';
                }
            }

            async function submitComment() {
                const name = nameInput.value.trim();
                const text = textInput.value.trim();
                if (!name || !text) {
                    alert('Пожалуйста, заполните имя и текст комментария.');
                    return;
                }
                submitBtn.disabled = true;
                submitBtn.textContent = 'Отправка...';
                try {
                    const formData = new URLSearchParams();
                    formData.append('action', 'add');
                    formData.append('name', name);
                    formData.append('comment', text);

                    const resp = await fetch(SCRIPT_URL, {
                        method: 'POST',
                        body: formData
                    });
                    if (!resp.ok) throw new Error('Ошибка сервера');
                    const result = await resp.json();
                    if (result && result.status === 'ok') {
                        nameInput.value = '';
                        textInput.value = '';
                        // Обновляем список комментариев с сервера
                        await loadComments();
                    } else {
                        alert('Сервер не принял комментарий: ' + (result.message || 'неизвестная ошибка'));
                    }
                } catch (err) {
                    console.error('Ошибка отправки:', err);
                    alert('Не удалось отправить комментарий. Проверьте соединение.');
                } finally {
                    submitBtn.disabled = false;
                    submitBtn.textContent = 'Отправить';
                }
            }

            commentForm.addEventListener('submit', function(e) {
                e.preventDefault();
                submitComment();
            });

            // Первичная загрузка
            loadComments();
        })();
    </script>
</body>
</html>
