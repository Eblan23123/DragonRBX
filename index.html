<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Roblox Places Hub — честный разбор</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:opsz,wght@14..32,400;14..32,500;14..32,600&display=swap" rel="stylesheet">
    <style>
        /* весь CSS без изменений, как в последнем ответе */
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body { font-family: 'Inter', sans-serif; background: #08080c; color: #c8c8d4; min-height: 100vh; line-height: 1.5; -webkit-font-smoothing: antialiased; }
        body::after { content: ''; position: fixed; top: 0; left: 0; width: 100%; height: 100%; background-image: url("data:image/svg+xml,%3Csvg viewBox='0 0 200 200' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='noise'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='0.9' numOctaves='4' stitchTiles='stitch'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23noise)' opacity='0.03'/%3E%3C/svg%3E"); pointer-events: none; z-index: 0; }
        .content-wrapper { position: relative; z-index: 1; max-width: 1300px; margin: 0 auto; padding: 1.5rem 2rem 3rem; }
        .lang-modal-overlay { position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(4,4,8,0.85); backdrop-filter: blur(8px); display: flex; align-items: center; justify-content: center; z-index: 1000; transition: opacity 0.3s ease; }
        .lang-modal-overlay.hidden { opacity: 0; pointer-events: none; }
        .lang-modal { background: rgba(16,16,20,0.8); backdrop-filter: blur(16px); border: 1px solid rgba(255,255,255,0.06); border-radius: 24px; padding: 2.5rem 2.2rem; text-align: center; box-shadow: 0 20px 40px rgba(0,0,0,0.6); max-width: 360px; width: 90%; animation: modalAppear 0.35s ease; }
        @keyframes modalAppear { from { opacity: 0; transform: scale(0.95) translateY(15px); } to { opacity: 1; transform: scale(1) translateY(0); } }
        .lang-modal h2 { font-weight: 500; font-size: 1.5rem; margin-bottom: 2rem; color: #ccccdd; }
        .lang-buttons { display: flex; gap: 1rem; justify-content: center; }
        .lang-btn { background: rgba(255,255,255,0.04); border: 1px solid rgba(255,255,255,0.08); border-radius: 14px; padding: 0.9rem 1.8rem; font-size: 1rem; font-weight: 500; color: #aaa; cursor: pointer; transition: all 0.2s; background: #15151a; }
        .lang-btn:hover { background: #25252e; color: #ddd; border-color: rgba(255,255,255,0.15); }
        header { display: flex; justify-content: space-between; align-items: center; flex-wrap: wrap; gap: 1rem; margin-bottom: 3rem; border-bottom: 1px solid rgba(255,255,255,0.04); padding-bottom: 1.2rem; }
        .logo { font-weight: 600; font-size: 1.6rem; letter-spacing: -0.5px; color: #d0d0e0; }
        .logo span { color: #8b8b9e; font-weight: 500; margin-left: 0.3rem; }
        .header-lang-switch { display: flex; gap: 0.3rem; background: #12121a; border-radius: 30px; padding: 0.25rem; border: 1px solid rgba(255,255,255,0.05); }
        .lang-option { background: transparent; border: none; color: #7a7a8c; padding: 0.45rem 1.2rem; border-radius: 24px; font-weight: 500; font-size: 0.85rem; cursor: pointer; transition: 0.15s; }
        .lang-option.active { background: #2a2a38; color: #e0e0f0; box-shadow: 0 0 6px rgba(0,0,0,0.3); }
        .section { margin-bottom: 4rem; }
        .section-title { font-weight: 600; font-size: 1.5rem; margin-bottom: 1.8rem; color: #bcbcd4; display: flex; align-items: center; gap: 0.6rem; border-left: 3px solid #3a3a50; padding-left: 1rem; }
        .section-title .emoji { font-size: 1.6rem; filter: grayscale(0.3); }
        .cards-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(260px, 1fr)); gap: 1.5rem; }
        .card { background: #101014; border: 1px solid #1e1e26; border-radius: 18px; padding: 1.5rem 1.4rem; transition: all 0.25s ease; position: relative; backdrop-filter: blur(4px); animation: fadeIn 0.5s ease forwards; opacity: 0; }
        .card:nth-child(1) { animation-delay: 0.05s; } .card:nth-child(2) { animation-delay: 0.1s; } .card:nth-child(3) { animation-delay: 0.15s; } .card:nth-child(4) { animation-delay: 0.2s; } .card:nth-child(5) { animation-delay: 0.25s; } .card:nth-child(6) { animation-delay: 0.3s; } .card:nth-child(7) { animation-delay: 0.35s; } .card:nth-child(8) { animation-delay: 0.4s; } .card:nth-child(9) { animation-delay: 0.45s; } .card:nth-child(10) { animation-delay: 0.5s; } .card:nth-child(11) { animation-delay: 0.55s; } .card:nth-child(12) { animation-delay: 0.6s; } .card:nth-child(13) { animation-delay: 0.65s; } .card:nth-child(14) { animation-delay: 0.7s; }
        @keyframes fadeIn { to { opacity: 1; } }
        .card:hover { background: #17171f; border-color: #2c2c3a; transform: translateY(-3px); box-shadow: 0 12px 24px rgba(0,0,0,0.5); }
        .card-badge { display: inline-block; padding: 0.25rem 0.8rem; border-radius: 16px; font-size: 0.7rem; font-weight: 600; letter-spacing: 0.4px; margin-bottom: 1rem; text-transform: uppercase; }
        .badge-paytowin { background: #2a1a1f; color: #c9707c; border: 1px solid #4a2a33; }
        .badge-grindy { background: #2a2316; color: #b89a5e; border: 1px solid #4a402a; }
        .badge-good { background: #162a1f; color: #6ba87a; border: 1px solid #264a30; }
        .card-title { font-weight: 600; font-size: 1.2rem; margin-bottom: 0.5rem; color: #e8e8f0; }
        .card-desc { color: #9090a4; font-size: 0.9rem; line-height: 1.5; }
        .comments-section { margin-top: 5rem; border-top: 1px solid #1e1e28; padding-top: 2.5rem; }
        .comments-title { font-weight: 600; font-size: 1.5rem; margin-bottom: 1.5rem; color: #bcbcd4; border-left: 3px solid #3a3a50; padding-left: 1rem; }
        .comment-form { display: flex; flex-wrap: wrap; gap: 0.8rem; margin-bottom: 2rem; }
        .comment-input { background: #12121a; border: 1px solid #2a2a38; border-radius: 12px; padding: 0.8rem 1rem; color: #ddd; font-family: 'Inter', sans-serif; font-size: 0.9rem; outline: none; transition: border-color 0.2s; flex: 1 1 200px; }
        .comment-input:focus { border-color: #5a5a7a; }
        .comment-textarea { flex: 2 1 300px; min-height: 80px; resize: vertical; }
        .comment-submit { background: #1a1a2e; border: 1px solid #3a3a50; border-radius: 12px; padding: 0.8rem 1.8rem; font-weight: 500; color: #ccc; cursor: pointer; transition: 0.2s; font-size: 0.9rem; background: #15152a; white-space: nowrap; }
        .comment-submit:hover { background: #252540; border-color: #6a6a8e; color: #fff; }
        .comments-container { display: flex; flex-direction: column; gap: 1rem; max-height: 500px; overflow-y: auto; padding-right: 0.5rem; }
        .comment-item { background: #0e0e14; border: 1px solid #1c1c26; border-radius: 14px; padding: 1rem 1.2rem; animation: fadeIn 0.3s ease; }
        .comment-meta { display: flex; justify-content: space-between; font-size: 0.8rem; color: #6a6a80; margin-bottom: 0.4rem; }
        .comment-author { font-weight: 600; color: #9a9ab8; }
        .comment-text { color: #b0b0c0; line-height: 1.5; font-size: 0.95rem; }
        .loading-comments { color: #5a5a70; font-style: italic; padding: 1rem 0; }
        footer { margin-top: 3rem; border-top: 1px solid #1a1a24; padding-top: 1.8rem; text-align: center; color: #5a5a6e; font-size: 0.9rem; display: flex; flex-direction: column; align-items: center; gap: 0.5rem; }
        .creator { font-weight: 500; color: #7e7e94; }
        .creator a, .telegram-link a { color: #9a9ab8; text-decoration: none; border-bottom: 1px dotted #4a4a60; }
        .creator a:hover, .telegram-link a:hover { color: #c0c0e0; }
        .telegram-link { color: #6a6a80; }
        @media (max-width: 600px) { .content-wrapper { padding: 1rem 1.2rem 2rem; } .cards-grid { grid-template-columns: 1fr; } .section-title { font-size: 1.3rem; } .comment-form { flex-direction: column; } }
    </style>
</head>
<body>
    <div class="content-wrapper">
        <!-- Выбор языка -->
        <div id="languageModal" class="lang-modal-overlay">
            <div class="lang-modal">
                <h2>Choose language / Выберите язык</h2>
                <div class="lang-buttons">
                    <button class="lang-btn" data-lang="en">English</button>
                    <button class="lang-btn" data-lang="ru">Русский</button>
                </div>
            </div>
        </div>

        <header>
            <div class="logo">Roblox Places Hub <span>— без прикрас</span></div>
            <div class="header-lang-switch" id="headerLangSwitch">
                <button class="lang-option" data-lang="ru">RU</button>
                <button class="lang-option" data-lang="en">EN</button>
            </div>
        </header>

        <main>
            <section class="section"><h2 class="section-title"><span class="emoji">💸</span> <span data-i18n="section_paytowin">Донатные помойки</span></h2><div class="cards-grid" id="cards-paytowin"></div></section>
            <section class="section"><h2 class="section-title"><span class="emoji">⏳</span> <span data-i18n="section_grindy">Гриндилки</span></h2><div class="cards-grid" id="cards-grindy"></div></section>
            <section class="section"><h2 class="section-title"><span class="emoji">🌟</span> <span data-i18n="section_good">Живые места</span></h2><div class="cards-grid" id="cards-good"></div></section>

            <section class="comments-section">
                <h2 class="comments-title">💬 Комментарии</h2>
                <div class="comment-form" id="comment-form">
                    <input type="text" class="comment-input" id="commentName" placeholder="Ваше имя" maxlength="40">
                    <textarea class="comment-input comment-textarea" id="commentText" placeholder="Ваш комментарий" maxlength="500"></textarea>
                    <button class="comment-submit" id="submitComment">Отправить</button>
                </div>
                <div class="comments-container" id="comments-container"><div class="loading-comments">Загрузка...</div></div>
            </section>
        </main>

        <footer>
            <div class="creator">Создано <a href="https://www.youtube.com/@YT_FlorikHorrors" target="_blank">YT_FlorikHorrors</a></div>
            <div class="telegram-link">Связь: <a href="https://t.me/UnicReactorChernobyl" target="_blank">@UnicReactorChernobyl</a></div>
            <div>© 2025 Roblox Places Hub — субъективный обзор</div>
        </footer>
    </div>

    <script>
        (function() {
            // ⚠️ СЮДА ВСТАВЬТЕ НОВЫЙ URL ПОСЛЕ РАЗВЁРТЫВАНИЯ
            const SCRIPT_URL = 'https://script.google.com/macros/s/ВАШ_НОВЫЙ_URL/exec';
            const LOCAL_COMMENTS_KEY = 'roblox_local_comments';

            const contentData = {
                ru: {
                    sections: { paytowin: "Донатные помойки", grindy: "Гриндилки", good: "Живые места" },
                    games: {
                        paytowin: [
                            { title: "Pet Empire X", desc: "Питомцы только за робуксы. Без доната прогресс закрыт." },
                            { title: "Mega Clicker Race", desc: "Топы покупают бустеры. Бесплатная игра — бесконечный слив." },
                            { title: "Super Hero Legends", desc: "Герои за реальные деньги. Бесплатные бесполезны против платных." },
                            { title: "Adopt Me! (выборочно)", desc: "Легендарные яйца и транспорт за Robux. Экономика донатная." },
                            { title: "Pet Simulator X", desc: "Гигантские яйца за валюту, усиления только за премиум." },
                            { title: "Anime Punching Simulator", desc: "Лучшие кулаки — премиум-магазин. Донат + гринд." },
                            { title: "Car Dealership Tycoon", desc: "Премиум-машины быстрее. Без доната путь до топа бесконечен." },
                            { title: "Speed City", desc: "Лучшие двигатели и нитро за Robux. Без оплаты ты медленный." },
                            { title: "My Restaurant Tycoon", desc: "Премиум-повара и декор за деньги. Бесплатно — вечный фастфуд." },
                            { title: "Pet Ranch Simulator", desc: "Редкие животные только в платных яйцах. Бесплатные не прокачать." },
                            { title: "Boxing Simulator", desc: "Сильные перчатки и усиления в магазине Robux. Фарм без доната страдает." },
                            { title: "VIP Island Resort", desc: "Доступ к лучшим зонам только через VIP-пропуск за Robux." },
                            { title: "Dragon Battle Sim", desc: "Мощные драконы в платных сундуках. Бесплатные слабые." },
                            { title: "Mega Tycoon World", desc: "Ускорители и редкие предметы исключительно за донат." }
                        ],
                        grindy: [ /* ... полный список ... */ ],
                        good: [ /* ... */ ]
                    }
                },
                en: { /* ... */ }
            };

            const STORAGE_KEY = 'roblox_hub_lang_v12';
            const modal = document.getElementById('languageModal');
            const headerButtons = document.querySelectorAll('.lang-option');

            function setActiveHeaderButton(lang) { /* ... */ }
            function renderCards(lang) { /* ... */ }
            function applyLanguage(lang) { /* ... */ }

            const savedLang = localStorage.getItem(STORAGE_KEY);
            if (savedLang && (savedLang === 'ru' || savedLang === 'en')) {
                applyLanguage(savedLang);
                modal.classList.add('hidden');
            } else {
                modal.classList.remove('hidden');
                renderCards('ru');
                setActiveHeaderButton('ru');
            }

            document.querySelectorAll('.lang-btn').forEach(btn => {
                btn.addEventListener('click', function(e) {
                    const lang = this.getAttribute('data-lang');
                    if (lang) applyLanguage(lang);
                });
            });
            headerButtons.forEach(btn => {
                btn.addEventListener('click', function() {
                    const lang = this.getAttribute('data-lang');
                    if (lang) applyLanguage(lang);
                });
            });

            // ======================
            // КОММЕНТАРИИ (только сервер, без localStorage, чтобы исключить путаницу)
            // ======================
            const commentsContainer = document.getElementById('comments-container');
            const commentForm = document.getElementById('comment-form');
            const nameInput = document.getElementById('commentName');
            const textInput = document.getElementById('commentText');
            const submitBtn = document.getElementById('submitComment');

            function escapeHtml(text) {
                return text.replace(/&/g,"&amp;").replace(/</g,"&lt;").replace(/>/g,"&gt;").replace(/"/g,"&quot;").replace(/'/g,"&#039;");
            }

            function renderComments(comments) {
                if (!comments.length) {
                    commentsContainer.innerHTML = '<div class="loading-comments">Пока нет комментариев.</div>';
                    return;
                }
                commentsContainer.innerHTML = comments.map(c => {
                    const name = escapeHtml(c.name || 'Аноним');
                    const text = escapeHtml(c.comment || c.text || '');
                    const date = c.timestamp || c.date || '';
                    const formattedDate = date ? new Date(date).toLocaleString() : '';
                    return `<div class="comment-item">
                                <div class="comment-meta">
                                    <span class="comment-author">${name}</span>
                                    <span>${formattedDate}</span>
                                </div>
                                <div class="comment-text">${text}</div>
                            </div>`;
                }).join('');
            }

            async function loadComments() {
                commentsContainer.innerHTML = '<div class="loading-comments">Загрузка...</div>';
                try {
                    const resp = await fetch(SCRIPT_URL + '?action=get&_=' + Date.now());
                    if (!resp.ok) throw new Error('Статус ' + resp.status);
                    const data = await resp.json();
                    if (data && data.comments) {
                        renderComments(data.comments);
                    } else {
                        renderComments([]);
                    }
                } catch (e) {
                    commentsContainer.innerHTML = '<div class="loading-comments">⚠️ Не удалось загрузить комментарии с сервера.</div>';
                    console.error(e);
                }
            }

            async function submitComment() {
                const name = nameInput.value.trim();
                const text = textInput.value.trim();
                if (!name || !text) {
                    alert('Заполните имя и текст.');
                    return;
                }
                submitBtn.disabled = true;
                submitBtn.textContent = 'Отправка...';
                try {
                    const formData = new URLSearchParams();
                    formData.append('action', 'add');
                    formData.append('name', name);
                    formData.append('comment', text);
                    const resp = await fetch(SCRIPT_URL, {
                        method: 'POST',
                        body: formData
                    });
                    if (!resp.ok) throw new Error('Ошибка сервера');
                    const result = await resp.json();
                    if (result && result.status === 'ok') {
                        nameInput.value = '';
                        textInput.value = '';
                        await loadComments(); // обновляем список с сервера
                    } else {
                        alert('Комментарий не сохранён: ' + (result.message || 'неизвестная ошибка'));
                    }
                } catch (e) {
                    alert('Не удалось отправить комментарий.');
                    console.error(e);
                } finally {
                    submitBtn.disabled = false;
                    submitBtn.textContent = 'Отправить';
                }
            }

            commentForm.addEventListener('submit', function(e) {
                e.preventDefault();
                submitComment();
            });

            loadComments();
        })();
    </script>
</body>
</html>
